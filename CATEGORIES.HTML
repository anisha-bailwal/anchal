    <script>
        function loadContent(button, file, title) {
            const contentArea = document.getElementById('contentArea');
            const contentTitle = document.getElementById('contentTitle');
            
            // Show loading state
            contentTitle.textContent = title;
            contentArea.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #3b82f6;"></i><p style="margin-top: 20px; color: #64748b;">Loading...</p></div>';
            
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('File not found: ' + file);
                    }
                    return response.text();
                })
                .then(data => {
                    contentArea.innerHTML = data;
                    
                    // Remove active class from all buttons
                    document.querySelectorAll('.sidebar-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    
                    // Add active class to clicked button
                    button.classList.add('active');
                    
                    // Scroll to top
                    contentArea.scrollTop = 0;
                    
                    // Initialize toggle buttons for solutions
                    initializeToggleButtons();
                    
                    console.log('Content loaded successfully: ' + file);
                })
                .catch(error => {
                    contentArea.innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #dc2626; margin-bottom: 1rem;"></i>
                            <h3 style="color: #dc2626; margin-bottom: 0.5rem;">Error Loading Content</h3>
                            <p style="color: #7f8c8d; margin-bottom: 1rem;">Could not load: <strong>${file}</strong></p>
                            <p style="color: #94a3b8; font-size: 0.9rem;">Make sure the file exists in the same directory.</p>
                        </div>
                    `;
                    console.error('Loading error:', error);
                });
        }

        // Initialize toggle buttons for solutions
        function initializeToggleButtons() {
            document.querySelectorAll('.toggle-solution').forEach(button => {
                button.addEventListener('click', function() {
                    const solution = this.nextElementSibling;
                    solution.classList.toggle('hidden');
                    
                    // Change icon
                    const icon = this.querySelector('i');
                    if (solution.classList.contains('hidden')) {
                        icon.classList.remove('fa-chevron-up');
                        icon.classList.add('fa-chevron-down');
                    } else {
                        icon.classList.remove('fa-chevron-down');
                        icon.classList.add('fa-chevron-up');
                    }
                });
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeToggleButtons);
    </script>
